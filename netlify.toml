[build]
  command = "npm run build"
  # TanStack Start (via @netlify/vite-plugin-tanstack-start) emits the static
  # client assets to dist/client and registers the SSR handler as a Netlify
  # function. Publishing "dist" (the old SPA path) makes every /assets/*.css and
  # *.js request 404, so the deployed site renders as unstyled HTML.
  publish = "dist/client"

[dev]
  command = "npm run dev -- --host 0.0.0.0 --port 5173"
  targetPort = 5173
  port = 8888
  framework = "#custom"
  autoLaunch = false

[functions]
  directory = "netlify/functions"